name = "voltius-updater"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
GITHUB_OWNER = "VoltiusApp"
GITHUB_REPO = "voltius"
# Set to "true" to skip proxying and return browser_download_url directly
PUBLIC_REPO = "false"

# Required when PUBLIC_REPO = "false". Set via: wrangler secret put GITHUB_TOKEN
# Needs: Repository permissions → Contents → Read-only

[observability]
[observability.logs]
enabled = true
invocation_logs = true